<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裁缝店魏晋故事集</title>
    <style>
        /* ===== CSS 变量 ===== */
        :root {
            --bg-deep: #0a0f2c;
            --bg-card: #111640;
            --accent-gold: #c9a96e;
            --accent-warm: #d4b896;
            --text-light: #e8e0d5;
            --text-muted: #b0a89a;
            --cream: #f5efe0;
            --sage: #d5d9c8;
            --ink: #1a1a2e;
            --white: #fafaf8;
            --border-subtle: rgba(201, 169, 110, 0.2);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 36px rgba(0, 0, 0, 0.45);
            --radius: clamp(8px, 1.2vw, 12px);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== 基础重置 ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
        }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", "Songti SC", "微软雅黑", "Microsoft YaHei", serif;
            background: #1e3b7a;
            background-attachment: fixed;
            /* 核心：高度撑满视口，内容居中，禁止溢出滚动 */
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 内边距随视口缩放 */
            padding: clamp(4px, 1.5vh, 24px) clamp(6px, 2vw, 20px);
            color: var(--text-light);
            line-height: 1.5;
            overflow: hidden;
        }

        /* 极小屏幕允许滚动作为兜底 */
        @media (max-height: 500px), (max-width: 280px) {
            body {
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
                min-height: 100dvh;
            }
        }

        /* ===== 装饰背景纹理 ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(201, 169, 110, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(180, 160, 140, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(140, 120, 90, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 主容器 ===== */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: clamp(300px, 90vw, 680px);
            display: flex;
            flex-direction: column;
            /* 间隙随视口高度缩放 */
            gap: clamp(3px, 1vh, 18px);
            flex: 0 1 auto;
            /* 让内容在可用空间内均匀分布 */
            justify-content: center;
        }

        /* ===== 顶部标题区 ===== */
        .header {
            text-align: center;
            /* 内边距随视口缩放 */
            padding: clamp(10px, 3vh, 48px) clamp(8px, 2vw, 24px) clamp(6px, 1.8vh, 36px);
            position: relative;
        }

        .header-icon {
            font-size: clamp(24px, 5vw, 42px);
            margin-bottom: clamp(4px, 1vh, 16px);
            display: block;
            opacity: 0.9;
            filter: drop-shadow(0 2px 8px rgba(201, 169, 110, 0.3));
        }

        .header h1 {
            font-size: clamp(18px, 4.5vw, 38px);
            font-weight: 700;
            letter-spacing: clamp(3px, 0.8vw, 6px);
            color: var(--cream);
            text-shadow: 0 2px 12px rgba(200, 180, 150, 0.25);
            margin-bottom: clamp(2px, 0.5vh, 8px);
            white-space: nowrap;
        }

        .header .subtitle {
            font-size: clamp(11px, 2vw, 18px);
            color: var(--accent-gold);
            letter-spacing: clamp(4px, 1vw, 8px);
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* ===== 装饰线 ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 16px);
            padding: 0 clamp(10px, 3vw, 20px);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            opacity: 0.3;
        }

        .divider-dot {
            width: clamp(4px, 0.8vw, 6px);
            height: clamp(4px, 0.8vw, 6px);
            background: var(--accent-gold);
            border-radius: 50%;
            opacity: 0.5;
            flex-shrink: 0;
        }

        /* ===== 警告/提醒条 ===== */
        .notice-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(6px, 1.5vw, 12px);
            padding: clamp(8px, 2vh, 18px) clamp(12px, 3vw, 28px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: var(--radius);
            text-align: center;
            font-size: clamp(12px, 2.2vw, 22px);
            color: #ffffff;
            letter-spacing: clamp(1px, 0.4vw, 3px);
        }

        .notice-bar .icon {
            font-size: clamp(14px, 2.6vw, 26px);
            opacity: 0.9;
            flex-shrink: 0;
        }

        /* ===== 链接行（Lofter / AO3） ===== */
        .link-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(6px, 1.5vw, 14px);
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vw, 8px);
            padding: clamp(8px, 2vh, 16px) clamp(8px, 2vw, 20px);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text-light);
            font-size: clamp(12px, 2vw, 18px);
            font-weight: 600;
            letter-spacing: clamp(1px, 0.3vw, 2px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(201, 169, 110, 0.08), transparent);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .link-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .link-card:hover::before {
            opacity: 1;
        }

        .link-card .platform-icon {
            font-size: clamp(16px, 2.6vw, 24px);
            flex-shrink: 0;
        }

        /* ===== 章节导航标题 ===== */
        .section-label {
            text-align: center;
            font-size: clamp(11px, 1.6vw, 16px);
            letter-spacing: clamp(3px, 0.6vw, 6px);
            color: var(--text-muted);
            text-transform: uppercase;
            padding: clamp(2px, 0.5vh, 8px) 0;
        }

        /* ===== 故事卡片网格 ===== */
        .story-grid {
            display: grid;
            /* 始终保持两列 */
            grid-template-columns: 1fr 1fr;
            gap: clamp(5px, 1.3vw, 14px);
        }

        .story-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(2px, 0.6vh, 6px);
            /* 内边距随视口缩放 */
            padding: clamp(10px, 3vh, 28px) clamp(6px, 1.5vw, 16px);
            text-decoration: none;
            border-radius: var(--radius);
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            /* 最小高度也随视口缩放 */
            min-height: clamp(50px, 10vh, 100px);
        }

        .story-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        /* 浅色卡片 */
        .story-card.light {
            background: #e8e4d8;
            color: var(--ink);
        }

        .story-card.light:hover {
            background: #f0ece2;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(200, 190, 170, 0.2);
        }

        /* 深色卡片 */
        .story-card.dark {
            background: #c5c8b8;
            color: var(--ink);
        }

        .story-card.dark:hover {
            background: #cfd2c2;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(180, 185, 165, 0.2);
        }

        .story-card .card-emoji {
            font-size: clamp(16px, 3vw, 26px);
            opacity: 0.7;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .story-card:hover .card-emoji {
            opacity: 1;
            transform: scale(1.1);
        }

        .story-card .card-title {
            font-size: clamp(12px, 2.2vw, 19px);
            font-weight: 700;
            letter-spacing: clamp(1px, 0.4vw, 3px);
            transition: var(--transition);
        }

        .story-card .card-subtitle {
            font-size: clamp(9px, 1.3vw, 12px);
            letter-spacing: clamp(1px, 0.25vw, 2px);
            opacity: 0.55;
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            padding: clamp(4px, 1.5vh, 24px) 0 clamp(2px, 0.5vh, 8px);
            font-size: clamp(9px, 1.3vw, 12px);
            color: var(--text-muted);
            letter-spacing: clamp(1px, 0.4vw, 3px);
            opacity: 0.5;
            flex-shrink: 0;
        }

        /* ===== 响应式微调：超小屏 ===== */
        @media (max-width: 360px) {
            .header h1 {
                white-space: normal;
                font-size: clamp(16px, 5vw, 20px);
            }

            .story-card {
                padding: 8px 4px;
                min-height: 44px;
                gap: 2px;
            }

            .story-card .card-title {
                font-size: clamp(11px, 3.5vw, 13px);
                letter-spacing: 1px;
            }

            .story-card .card-emoji {
                font-size: clamp(14px, 4vw, 18px);
            }

            .notice-bar {
                padding: 6px 10px;
                font-size: clamp(10px, 3vw, 12px);
                letter-spacing: 1px;
            }

            .link-card {
                padding: 6px 8px;
                font-size: clamp(10px, 2.8vw, 12px);
            }
        }

        /* ===== 响应式微调：平板/中等屏 ===== */
        @media (min-width: 600px) and (max-width: 900px) {
            .container {
                max-width: 85vw;
            }
        }

        /* ===== 响应式微调：宽屏 ===== */
        @media (min-width: 1400px) {
            .container {
                max-width: 700px;
            }
        }

        /* ===== 横屏手机适配 ===== */
        @media (max-height: 500px) and (orientation: landscape) {
            .header {
                padding: 4px 8px 2px;
            }
            .header-icon {
                font-size: 18px;
                margin-bottom: 2px;
            }
            .header h1 {
                font-size: 15px;
                margin-bottom: 0;
            }
            .header .subtitle {
                font-size: 10px;
            }
            .story-grid {
                grid-template-columns: repeat(6, 1fr);
                gap: 4px;
            }
            .story-card {
                padding: 6px 4px;
                min-height: auto;
            }
            .story-card .card-emoji {
                font-size: 16px;
            }
            .story-card .card-title {
                font-size: 10px;
                letter-spacing: 0;
            }
            .notice-bar {
                padding: 4px 8px;
                font-size: 10px;
            }
            .link-card {
                padding: 6px 10px;
                font-size: 11px;
            }
            .footer {
                padding: 2px 0;
                font-size: 9px;
            }
            .section-label {
                padding: 1px 0;
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="story-grid">

        <!-- ===== 页脚 ===== -->
        <footer class="footer">

    </div>

</body>
</html>
